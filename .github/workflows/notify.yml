name: Telegram Digest Notifier

on:
  schedule:
    - cron: '25 */3 * * *'   # UTC, runs after X scraper (0 */3) and YT scraper (10 */3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          X_REPO: ${{ vars.X_REPO || 'Fatih0234/x-botty' }}
          YT_REPO: ${{ vars.YT_REPO || 'Fatih0234/youtube-competitor-tracker' }}
          X_RELEASE_ASSET_NAME: ${{ vars.X_RELEASE_ASSET_NAME || 'twitter.db' }}
          YT_RELEASE_ASSET_NAME: ${{ vars.YT_RELEASE_ASSET_NAME || 'youtube_competitor_tracker.db' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FRESHNESS_HOURS: ${{ vars.FRESHNESS_HOURS || '4' }}
        run: python src/main.py

      - name: Commit and push state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update notification state [skip ci]"
          git push
